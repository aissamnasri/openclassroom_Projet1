<button (click)="goBack()">← Retour</button>

<div *ngIf="country$ | async as country; else error">

  <app-header
    [title]="country.country"
    [stats]="stats">
  </app-header>

  <app-chart
    [data]="[country]"
    chartType="line">
  </app-chart>

</div>

<ng-template #error>
  <p>Pays introuvable</p>
</ng-template>
